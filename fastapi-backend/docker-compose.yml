services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: house-safety-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: house_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: house_safety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U house_user -d house_safety"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:7-alpine
    container_name: house-safety-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # FastAPI Backend
  api:
    build: .
    container_name: house-safety-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
